<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Downloads</title>

    <style>
        body {
            font-family: sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }

        #container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .download-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            width: 250px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .file-name {
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            font-size: 1.1em;
        }

        .info {
            font-size: 0.9em;
            text-align: left;
            margin-bottom: 10px;
        }

        .info p {
            margin: 5px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .btn:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<h1>Downloads</h1>
<div id="container">Daten werden geladen...</div>

<script>

const dateien = [
    "android.json",
    "windows.json",
    "linux.json",
    "ios.json",
    "macosx.json"
];

async function testLaden() {
    const container = document.getElementById("container");
    container.innerHTML = "";

    for (const datei of dateien) {
        const card = document.createElement("div");
        card.className = "download-card";
        card.innerHTML = "<div class='file-name'>Lade...</div>";
        container.appendChild(card);

        try {
            const response = await fetch(datei);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();

            const channel =
                data.Channel && data.Channel !== "---"
                    ? `<p><strong>Channel:</strong> ${data.Channel}</p>`
                    : "";

            const version =
                data.Version && data.Version !== "---"
                    ? `<p><strong>Version:</strong> ${data.Version}</p>`
                    : "";

            const datum =
                data.Datum && data.Datum !== "---"
                    ? `<p><strong>Datum:</strong> ${data.Datum}</p>`
                    : "";

            const infos = channel + version + datum;

            const downloadButton =
                data.URL && data.URL !== "---"
                    ? `<a href="${data.URL}" class="btn" target="_blank">Download</a>`
                    : "";

            card.innerHTML = `
                <div class="file-name">
                    ${data.Plattform || "Unbekannt"}
                </div>

                ${infos ? `<div class="info">${infos}</div>` : ""}

                ${downloadButton}
            `;
        }
        catch (error) {
            card.innerHTML = `
                <div class="file-name">Fehler</div>
                <p class="error">
                    ${datei} konnte nicht geladen werden.
                </p>
            `;

            console.error(error);
        }
    }
}

window.addEventListener("DOMContentLoaded", testLaden);

</script>

</body>
</html>
